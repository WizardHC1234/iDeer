<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Recommender Desktop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
      --bg-a: #eef5ff;
      --bg-b: #f8fbff;
      --ink: #111827;
      --muted: #6b7280;
      --line: rgba(148, 163, 184, 0.22);
      --panel: rgba(255, 255, 255, 0.88);
      --panel-strong: rgba(255, 255, 255, 0.96);
      --accent: #0f766e;
      --accent-soft: rgba(15, 118, 110, 0.12);
      --accent-strong: #0f172a;
      --shadow: 0 28px 80px rgba(15, 23, 42, 0.14);
      --shadow-soft: 0 18px 44px rgba(15, 23, 42, 0.08);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Manrope", "Noto Sans SC", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 12%, rgba(14, 165, 233, 0.16), transparent 24%),
        radial-gradient(circle at 88% 14%, rgba(16, 185, 129, 0.14), transparent 22%),
        linear-gradient(180deg, var(--bg-a) 0%, var(--bg-b) 54%, #ffffff 100%);
    }

    .desktop-shell {
      display: grid;
      grid-template-columns: 248px minmax(0, 1fr);
      min-height: 100vh;
      padding: 18px;
      gap: 18px;
    }

    .sidebar {
      display: flex;
      flex-direction: column;
      padding: 22px 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: linear-gradient(180deg, rgba(255,255,255,0.82) 0%, rgba(246,249,255,0.92) 100%);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 8px 8px 20px;
    }

    .brand-mark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      border-radius: 18px;
      background: linear-gradient(135deg, #0f172a 0%, #111827 100%);
      color: #ffffff;
      font-weight: 800;
      letter-spacing: 0.18em;
      box-shadow: 0 14px 32px rgba(15, 23, 42, 0.22);
    }

    .brand h1 {
      margin: 0;
      font-size: 1.65rem;
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    .brand p {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .nav-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 8px;
    }

    .nav-button {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 14px 14px;
      border: none;
      border-radius: 18px;
      background: transparent;
      color: #475569;
      font: inherit;
      text-align: left;
      cursor: pointer;
      transition: transform 0.16s ease, background 0.16s ease, box-shadow 0.16s ease, color 0.16s ease;
    }

    .nav-button:hover {
      background: rgba(255, 255, 255, 0.72);
      color: var(--ink);
      transform: translateX(2px);
    }

    .nav-button[data-active="true"] {
      background: linear-gradient(135deg, rgba(15, 23, 42, 0.98) 0%, rgba(31, 41, 55, 0.98) 100%);
      color: #ffffff;
      box-shadow: 0 20px 36px rgba(15, 23, 42, 0.18);
    }

    .nav-icon {
      width: 18px;
      height: 18px;
      flex: 0 0 auto;
    }

    .nav-copy strong {
      display: block;
      font-size: 0.98rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .nav-copy span {
      display: block;
      margin-top: 3px;
      font-size: 0.76rem;
      opacity: 0.78;
    }

    .sidebar-footer {
      margin-top: auto;
      padding: 16px 10px 10px;
      border-top: 1px solid rgba(148, 163, 184, 0.14);
    }

    .profile-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(255,255,255,0.7);
      border: 1px solid rgba(148,163,184,0.14);
    }

    .profile-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.12), rgba(16, 185, 129, 0.16));
      color: #1d4ed8;
    }

    .profile-copy strong {
      display: block;
      font-size: 0.95rem;
    }

    .profile-copy span {
      font-size: 0.76rem;
      color: var(--muted);
    }

    .workspace {
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-width: 0;
    }

    .workspace-header {
      display: flex;
      align-items: stretch;
      justify-content: space-between;
      gap: 18px;
      padding: 22px 24px;
      border-radius: var(--radius-xl);
      border: 1px solid var(--line);
      background: linear-gradient(180deg, var(--panel-strong) 0%, rgba(255,255,255,0.82) 100%);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
    }

    .workspace-title h2 {
      margin: 0;
      font-size: clamp(1.8rem, 2.1vw, 2.5rem);
      line-height: 1.02;
      letter-spacing: -0.05em;
    }

    .workspace-title p {
      margin: 10px 0 0;
      max-width: 720px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 0.96rem;
    }

    .workspace-meta {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .meta-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      height: 42px;
      padding: 0 16px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.18);
      background: rgba(255, 255, 255, 0.78);
      color: var(--ink);
      text-decoration: none;
      font-weight: 700;
      font-size: 0.88rem;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
    }

    .meta-pill[data-tone="strong"] {
      background: linear-gradient(135deg, #0f172a 0%, #1f2937 100%);
      color: #ffffff;
      border-color: transparent;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
    }

    .stat-card {
      padding: 18px 18px 16px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.78);
      box-shadow: var(--shadow-soft);
    }

    .stat-card span {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #64748b;
    }

    .stat-card strong {
      display: block;
      margin-top: 10px;
      font-size: 1.12rem;
      letter-spacing: -0.03em;
    }

    .stat-card p {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.65;
    }

    .frame-shell {
      position: relative;
      min-height: 0;
      flex: 1;
      display: flex;
      flex-direction: column;
      border-radius: 32px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,0.78) 0%, rgba(255,255,255,0.72) 100%);
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .frame-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 18px 22px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.14);
      background: rgba(255,255,255,0.72);
    }

    .frame-topbar strong {
      display: block;
      font-size: 1rem;
      letter-spacing: -0.03em;
    }

    .frame-topbar span {
      color: var(--muted);
      font-size: 0.84rem;
    }

    .frame-window {
      position: relative;
      flex: 1;
      min-height: 0;
      background: linear-gradient(180deg, rgba(248,251,255,0.8) 0%, rgba(246,248,252,0.88) 100%);
    }

    #desktop-frame {
      width: 100%;
      height: 100%;
      min-height: 720px;
      border: none;
      display: block;
      background: transparent;
    }

    .frame-loading {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: rgba(248, 250, 252, 0.78);
      backdrop-filter: blur(8px);
      transition: opacity 0.18s ease, visibility 0.18s ease;
      z-index: 2;
    }

    .frame-loading.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border-radius: 999px;
      border: 2px solid rgba(15, 118, 110, 0.16);
      border-top-color: var(--accent);
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 1180px) {
      .desktop-shell {
        grid-template-columns: 1fr;
      }
      .sidebar {
        flex-direction: row;
        align-items: center;
        gap: 18px;
        overflow-x: auto;
      }
      .brand,
      .sidebar-footer {
        display: none;
      }
      .nav-list {
        flex-direction: row;
        min-width: max-content;
      }
      .workspace-header {
        flex-direction: column;
      }
      .stats-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="desktop-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">DR</div>
        <div>
          <h1>Daily Recommender</h1>
        </div>
      </div>

      <nav class="nav-list" id="nav-list"></nav>

      <div class="sidebar-footer">
        <div class="profile-card">
          <div class="profile-avatar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9">
              <path stroke-linecap="round" stroke-linejoin="round" d="M20 21a8 8 0 10-16 0"/>
              <circle cx="12" cy="8" r="4"/>
            </svg>
          </div>
          <div class="profile-copy">
            <strong>Researcher</strong>
            <span>Desktop mode</span>
          </div>
        </div>
      </div>
    </aside>

    <section class="workspace">
      <header class="workspace-header">
        <div class="workspace-title">
          <h2 id="screen-title">桌面首页</h2>
          <p id="screen-description">在桌面客户端里统一打开公开页、任务控制台、历史归档和配置模块。</p>
        </div>
        <div class="workspace-meta">
          <span class="meta-pill" id="status-pill">本地服务检测中</span>
          <span class="meta-pill" id="model-pill">模型读取中</span>
          <a class="meta-pill" id="open-web-link" href="/" target="_blank" rel="noreferrer">网页端</a>
          <a class="meta-pill" id="open-admin-link" href="/admin" target="_blank" rel="noreferrer">后台</a>
          <a class="meta-pill" data-tone="strong" href="https://github.com/LiYu0524/daily-recommender" target="_blank" rel="noreferrer">GitHub</a>
        </div>
      </header>

      <section class="stats-grid">
        <article class="stat-card">
          <span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
            </svg>
            当前视图
          </span>
          <strong id="screen-card-title">首页</strong>
          <p id="screen-card-copy">默认进入公开页，直接发送今日趋势邮件。</p>
        </article>
        <article class="stat-card">
          <span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M4 4h16v16H4z"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M8 8h8v8H8z"/>
            </svg>
            数据源
          </span>
          <strong id="sources-pill">4 个来源</strong>
          <p>GitHub、HuggingFace、X / Twitter、arXiv 均可在桌面壳内配置。</p>
        </article>
        <article class="stat-card">
          <span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8"/>
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
            邮件投递
          </span>
          <strong id="mail-pill">检测中</strong>
          <p id="mail-copy">会根据本地配置判断桌面端是否可以直接发信。</p>
        </article>
      </section>

      <section class="frame-shell">
        <div class="frame-topbar">
          <div>
            <strong id="frame-title">桌面首页</strong>
            <span id="frame-caption">已切换到公开页嵌入视图</span>
          </div>
          <span class="meta-pill" id="frame-badge">HOME</span>
        </div>
        <div class="frame-window">
          <div id="frame-loading" class="frame-loading">
            <div class="spinner"></div>
            <span>正在载入视图...</span>
          </div>
          <iframe id="desktop-frame" title="Daily Recommender Desktop View"></iframe>
        </div>
      </section>
    </section>
  </div>

  <script>
    const BASE_PATH = (() => {
      const path = window.location.pathname;
      const prefixes = ['/daily-recommender', '/dr'];
      return prefixes.find(prefix => path === prefix || path.startsWith(`${prefix}/`)) || '';
    })();

    const SCREENS = {
      home: {
        label: '首页',
        hint: '快速发送',
        title: '桌面首页',
        description: '默认进入公开页，快速发送今日汇总，或切到定制版补充兴趣与 Scholar / X 输入。',
        cardCopy: '打开公开页嵌入视图，直接在桌面客户端里发出今日趋势邮件。',
        route: '/?desktop_embed=1',
        frameCaption: '公开页嵌入视图',
        badge: 'HOME',
        icon: '<svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path stroke-linecap="round" stroke-linejoin="round" d="M3 11.5L12 4l9 7.5"/><path stroke-linecap="round" stroke-linejoin="round" d="M5 10.5V20h14v-9.5"/></svg>'
      },
      tasks: {
        label: '任务',
        hint: '运行与报告',
        title: '任务控制台',
        description: '进入后台的任务面板，运行推荐、生成跨源报告和研究想法。',
        cardCopy: '这里聚合快速运行、综合报告与研究想法三个动作。',
        route: '/admin?desktop_embed=1&desktop_view=dashboard',
        frameCaption: '后台控制台嵌入视图',
        badge: 'TASKS',
        icon: '<svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path stroke-linecap="round" stroke-linejoin="round" d="M4 7h16"/><path stroke-linecap="round" stroke-linejoin="round" d="M7 12h10"/><path stroke-linecap="round" stroke-linejoin="round" d="M10 17h4"/></svg>'
      },
      archive: {
        label: '归档',
        hint: '历史结果',
        title: '历史归档',
        description: '查看已经生成的日报、跨源汇总和研究想法，作为桌面端的结果中心。',
        cardCopy: '直接跳到历史记录视图，快速浏览每次运行留下的内容。',
        route: '/admin?desktop_embed=1&desktop_view=history',
        frameCaption: '历史记录嵌入视图',
        badge: 'ARCHIVE',
        icon: '<svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path stroke-linecap="round" stroke-linejoin="round" d="M4 5h16v14H4z"/><path stroke-linecap="round" stroke-linejoin="round" d="M8 9h8"/><path stroke-linecap="round" stroke-linejoin="round" d="M8 13h6"/></svg>'
      },
      sources: {
        label: '信息源',
        hint: '抓取参数',
        title: '信息源配置',
        description: '集中管理 GitHub、HuggingFace、X / Twitter 与 arXiv 的抓取参数和账号池。',
        cardCopy: '这里会直接定位到后台的信息源配置区域。',
        route: '/admin?desktop_embed=1&desktop_view=config&desktop_section=sources',
        frameCaption: '信息源配置嵌入视图',
        badge: 'SOURCES',
        icon: '<svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><circle cx="12" cy="12" r="8"/><path stroke-linecap="round" stroke-linejoin="round" d="M4 12h16"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 4a14 14 0 010 16"/><path stroke-linecap="round" stroke-linejoin="round" d="M12 4a14 14 0 000 16"/></svg>'
      },
      model: {
        label: '模型配置',
        hint: 'Provider / Model',
        title: '模型配置',
        description: '桌面端直接调整 Provider、Model、Base URL、API Key 与温度参数。',
        cardCopy: '这里会定位到 LLM 配置区域，便于快速切换模型与服务商。',
        route: '/admin?desktop_embed=1&desktop_view=config&desktop_section=model',
        frameCaption: '模型配置嵌入视图',
        badge: 'MODEL',
        icon: '<svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path stroke-linecap="round" stroke-linejoin="round" d="M5 6h14v12H5z"/><path stroke-linecap="round" stroke-linejoin="round" d="M9 10h6"/><path stroke-linecap="round" stroke-linejoin="round" d="M9 14h4"/></svg>'
      },
      output: {
        label: '输出配置',
        hint: 'SMTP / Delivery',
        title: '输出配置',
        description: '在桌面端完成发件邮箱、收件邮箱与发送密码设置，直接联动每日投递。',
        cardCopy: '这里会定位到输出配置区域，适合桌面端本机调试和日常投递。',
        route: '/admin?desktop_embed=1&desktop_view=config&desktop_section=output',
        frameCaption: '输出配置嵌入视图',
        badge: 'OUTPUT',
        icon: '<svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8"/><path stroke-linecap="round" stroke-linejoin="round" d="M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>'
      }
    };

    const state = {
      screen: 'home',
      meta: null,
      config: null
    };

    const navList = document.getElementById('nav-list');
    const frame = document.getElementById('desktop-frame');
    const frameLoading = document.getElementById('frame-loading');

    renderNav();

    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('open-web-link').href = `${BASE_PATH}/`;
      document.getElementById('open-admin-link').href = `${BASE_PATH}/admin`;

      frame.addEventListener('load', () => {
        frameLoading.classList.add('hidden');
      });

      const params = new URLSearchParams(window.location.search);
      const requestedScreen = params.get('screen');
      if (requestedScreen && SCREENS[requestedScreen]) {
        state.screen = requestedScreen;
      }

      setScreen(state.screen, true);
      hydrateMeta();
    });

    function renderNav() {
      navList.innerHTML = Object.entries(SCREENS).map(([key, screen]) => `
        <button type="button" class="nav-button" data-screen="${key}" data-active="${state.screen === key}" onclick="setScreen('${key}')">
          ${screen.icon}
          <span class="nav-copy">
            <strong>${screen.label}</strong>
            <span>${screen.hint}</span>
          </span>
        </button>
      `).join('');
    }

    async function hydrateMeta() {
      try {
        const [metaResponse, configResponse] = await Promise.all([
          fetch(`${BASE_PATH}/api/public/meta`),
          fetch(`${BASE_PATH}/api/config`)
        ]);
        if (metaResponse.ok) {
          state.meta = await metaResponse.json();
        }
        if (configResponse.ok) {
          state.config = await configResponse.json();
        }
      } catch (error) {
        console.error(error);
      }

      const mailReady = !!(state.meta && state.meta.mail_enabled);
      const twitterReady = !!(state.meta && state.meta.twitter_enabled);
      document.getElementById('status-pill').textContent = mailReady ? '本地服务在线' : '服务在线，邮件未配置';
      document.getElementById('model-pill').textContent = state.config?.model || '模型未配置';
      document.getElementById('mail-pill').textContent = mailReady ? '邮件投递可用' : '邮件投递待配置';
      document.getElementById('mail-copy').textContent = twitterReady
        ? 'Twitter / X 已配置，桌面端可直接使用一次性账号输入。'
        : 'Twitter / X 尚未配置，其他来源仍可正常发送。';
    }

    function setScreen(screen, replaceState = false) {
      if (!SCREENS[screen]) return;
      state.screen = screen;

      const current = SCREENS[screen];
      document.getElementById('screen-title').textContent = current.title;
      document.getElementById('screen-description').textContent = current.description;
      document.getElementById('screen-card-title').textContent = current.label;
      document.getElementById('screen-card-copy').textContent = current.cardCopy;
      document.getElementById('frame-title').textContent = current.title;
      document.getElementById('frame-caption').textContent = current.frameCaption;
      document.getElementById('frame-badge').textContent = current.badge;

      frameLoading.classList.remove('hidden');
      frame.src = `${BASE_PATH}${current.route}`;

      document.querySelectorAll('.nav-button').forEach((button) => {
        button.dataset.active = button.dataset.screen === screen ? 'true' : 'false';
      });

      const url = new URL(window.location.href);
      url.searchParams.set('screen', screen);
      if (replaceState) {
        window.history.replaceState({}, '', url);
      } else {
        window.history.pushState({}, '', url);
      }
    }

    window.addEventListener('popstate', () => {
      const params = new URLSearchParams(window.location.search);
      const requestedScreen = params.get('screen') || 'home';
      setScreen(requestedScreen, true);
    });
  </script>
</body>
</html>
